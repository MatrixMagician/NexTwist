# Pinned toolchain for NexTwist.
#
# Rust >= 1.89 is the workspace floor (Phase 2): libloot (Plan 04) requires 1.89.
# This subsumes the original >= 1.85 requirement, which is still load-bearing:
# `io::ErrorKind::CrossesDevices` (EXDEV detection for the per-target deploy-method
# ladder) was stabilized in 1.85, and the workspace targets the 2024 edition. The
# "stable" channel here is resolved to the installed toolchain (>= 1.89); CI should
# pin an explicit version if reproducibility across machines is required.
[toolchain]
channel = "stable"
components = ["rustfmt", "clippy"]
profile = "default"
