name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # The safety suite: the headless crates + the Tauri shell compile, plus cargo-deny.
  # The WebKitGTK dev libs are installed so `src-tauri` (a workspace member) compiles;
  # the headless safety crates themselves need none of them.
  test:
    name: test + deny (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl wget file libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build frontend (static SPA Tauri embeds)
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: cargo test --workspace
        run: cargo test --workspace --locked

      - name: cargo clippy --workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      # Supply-chain gate (DIST-02 pre-position): bans non-free UnRAR + advisories +
      # license policy. Fails the build if any banned/vulnerable dep is introduced.
      - name: cargo deny check
        run: cargo deny check advisories bans licenses sources
