# cargo-deny policy for NexTwist.
#
# Two jobs this file enforces from day one:
#   1. BANS: the non-free UnRAR C++ source (`unrar` / `unrar_sys` crates) must never
#      enter the dependency graph. Its license forbids using it to recreate the RAR
#      algorithm, making it non-free and GPL-incompatible — a licensing liability in
#      a redistributed AppImage. `.rar` support is handled by shelling out to a system
#      `unrar`/`7z` binary instead (Plan 03). This pre-positions DIST-02.
#   2. LICENSES: only permissive / project-compatible licenses are allowed in the
#      shipped binary.
#
# Run: `cargo deny check bans` (and `cargo deny check` for the full gate).

[graph]
all-features = true

[bans]
# Deny known/duplicate trouble crates. The UnRAR ban is the load-bearing rule.
multiple-versions = "warn"
wildcards = "allow"

[[bans.deny]]
name = "unrar"

[[bans.deny]]
name = "unrar_sys"

[licenses]
# Permissive set the stack uses. blake3/ring may pull Apache-2.0 WITH LLVM-exception;
# unicode-ident pulls Unicode-3.0. MPL-2.0 is file-level copyleft and compatible.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    # bzip2 decompression (libbz2-rs-sys, via zip/sevenz-rust2). The bzip2 license is a
    # permissive BSD-style, GPL-compatible, free license — fine to ship in the AppImage.
    "bzip2-1.0.6",
    # NexTwist itself is GPL-3.0-or-later; allow it so the workspace crates pass.
    # The libloot family is the LOOT project's plugin/load-order stack (added in Plan
    # 02 for the libloot Linux seam, fully consumed in Plan 04). Its members declare
    # TWO distinct GPL SPDX identifiers as published on crates.io (verified against the
    # installed crate sources, 2026-06-21):
    #   * libloot 0.29.5                  -> GPL-3.0-or-later
    #   * libloadorder 18.8.2             -> GPL-3.0 ("only" variant)
    #   * esplugin 6.1.4                  -> GPL-3.0 ("only" variant)
    #   * loot-condition-interpreter 6.0.0 -> MIT (already allowed above)
    # Both GPL identifiers are allowed here. NexTwist being GPL-3.0-or-later can
    # incorporate GPL-3.0-only components (a GPL-3.0-or-later work may be conveyed under
    # GPLv3), so the shipped AppImage stays license-compatible. (Plan 01's allowance
    # assumed the whole family was GPL-3.0-or-later; the published libloadorder/esplugin
    # crates actually carry bare GPL-3.0, so GPL-3.0 is added here in Plan 02.) Both are
    # carried forward to the Phase-5 DIST-02 license audit (RESEARCH LICENSE FLAG).
    "GPL-3.0-or-later",
    "GPL-3.0",
]
confidence-threshold = 0.9

[advisories]
# Advisory DB check wired into CI in Plan 06 (`cargo deny check advisories`).
#
# SECURITY VULNERABILITIES and YANKED crates still FAIL the build (the signal we care
# about). But "unmaintained"/"notice" advisories are downgraded to warnings: Tauri 2.11
# on Linux unavoidably pulls the gtk-rs GTK3 bindings and the unic-* crates (via
# WebKitGTK / tauri-utils -> urlpattern), an entire family of INFORMATIONAL
# "no-longer-maintained" advisories with no safe upgrade available — they are inside
# Tauri's own transitive tree, outside our control. Failing CI on them would gate every
# push on upstream Tauri's dependency hygiene rather than on a real vulnerability.
yanked = "deny"
# Scope unmaintained checks to OUR workspace crates only (not the transitive Tauri tree).
# cargo-deny 0.19's `unmaintained` takes a scope, not a severity.
unmaintained = "workspace"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
